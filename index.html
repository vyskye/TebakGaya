<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 CHARADES EMOJI · tebak gaya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #42275e 0%, #643b7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 246, 235, 0.95);
            border-radius: 70px;
            padding: 30px 25px 40px;
            box-shadow: 0 35px 40px -15px #1a1122, inset 0 0 0 2px #eedbba;
            border: 4px solid #b88a5f;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #ffd98c;
            text-shadow: 5px 5px 0 #5a3d7c, 7px 7px 0 #220033;
            text-align: center;
            margin-bottom: 20px;
        }
        .game-box {
            background: #4a3375;
            border-radius: 70px;
            padding: 30px 20px;
            border: 3px solid #f5cf91;
            box-shadow: inset 0 -7px 0 #2e1f4a;
        }
        .emoji-display {
            background: #fff6df;
            border-radius: 80px;
            padding: 50px 20px;
            text-align: center;
            font-size: 7rem;
            letter-spacing: 15px;
            border: 5px solid #e7b56c;
            box-shadow: inset 0 -10px 0 #be9a58;
            margin-bottom: 30px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin: 20px 0 25px;
        }
        .option-btn {
            background: #faeac6;
            border: 4px solid #7b5d36;
            padding: 22px 8px;
            border-radius: 60px;
            font-size: 1.9rem;
            font-weight: 700;
            color: #2a1b3d;
            cursor: pointer;
            box-shadow: 0 10px 0 #5f442a;
            transition: 0.06s;
            text-align: center;
        }
        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 3px 0 #4f3821;
        }
        .option-btn.selected-true {
            background: #b0dab0;
            border-color: #1f7322;
            box-shadow: 0 5px 0 #16631a;
            transform: translateY(5px);
            pointer-events: none;
        }
        .option-btn.selected-false {
            background: #e9b6b6;
            border-color: #a53f3f;
            box-shadow: 0 5px 0 #832e2e;
            transform: translateY(5px);
            pointer-events: none;
            text-decoration: line-through 3px #631c1c;
        }
        .feedback-area {
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
            background: #2e2350;
            color: #ffdcaa;
            padding: 20px;
            border-radius: 70px;
            border: 3px solid #dcb06b;
            margin: 20px 0 15px;
        }
        .reset-btn {
            background: #efc58b;
            border: none;
            padding: 20px 30px;
            border-radius: 70px;
            font-size: 1.9rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 9px 0 #876e40;
            border: 2px solid #f7dbaa;
            width: 100%;
            margin-top: 10px;
        }
        .reset-btn:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #6e5533;
        }
        .footer {
            text-align: center;
            color: #ac8f7a;
            margin-top: 20px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎭 CHARADES</h1>
        <div class="game-box">
            <div class="emoji-display" id="emojiDisplay">🐧🎤</div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="feedback-area" id="feedbackMsg">✨ tebak profesinya!</div>
            <button class="reset-btn" id="resetGameBtn">🎲 acak pertanyaan</button>
        </div>
        <div class="footer">❤️ tebak gaya dari emoji</div>
    </div>

    <script>
        const questions = [
            { emoji: "🐧🎤", correct: "PENYANYI", options: ["PENYANYI", "PELUKIS", "DOKTER", "KOKI"] },
            { emoji: "🐟🌊", correct: "NELAYAN", options: ["NELAYAN", "PELAYAN", "PERENANG", "PENYELAM"] },
            { emoji: "🍕👨‍🍳", correct: "KOKI", options: ["KOKI", "PIZZA", "WAITER", "PEDAGANG"] },
            { emoji: "⚽🥅", correct: "PEMAIN BOLA", options: ["PEMAIN BOLA", "WASIT", "PELATIH", "KIPER"] },
            { emoji: "✈️👩‍✈️", correct: "PILOT", options: ["PILOT", "PRAMUGARI", "MASINIS", "SOPIR"] },
            { emoji: "🎨🖌️", correct: "PELUKIS", options: ["PELUKIS", "PEMATUNG", "DESAINER", "KRITIKUS"] },
            { emoji: "🌾🚜", correct: "PETANI", options: ["PETANI", "KEBUN", "NELAYAN", "BERKEBUN"] },
            { emoji: "🦷👩‍⚕️", correct: "DOKTER GIGI", options: ["DOKTER GIGI", "DOKTER", "BIDAN", "PERAWAT"] },
            { emoji: "🚒🔥", correct: "PEMADAM KEBAKARAN", options: ["PEMADAM KEBAKARAN", "POLISI", "SATUAN", "DAMKAR"] },
            { emoji: "💻👨‍💻", correct: "PROGRAMMER", options: ["PROGRAMMER", "DESAINER", "GAMER", "SISTEM ANALIS"] }
        ];

        let currentQuestion = null;
        let locked = false;

        const emojiEl = document.getElementById('emojiDisplay');
        const optionsGrid = document.getElementById('optionsGrid');
        const feedbackEl = document.getElementById('feedbackMsg');
        const resetBtn = document.getElementById('resetGameBtn');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function pickRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * questions.length);
            return { ...questions[randomIndex] };
        }

        function renderQuestion() {
            if (!currentQuestion) return;

            emojiEl.textContent = currentQuestion.emoji;
            const shuffledOptions = shuffleArray([...currentQuestion.options]);

            optionsGrid.innerHTML = '';
            locked = false;
            feedbackEl.innerHTML = '🤔 coba tebak!';

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.option = opt;

                btn.addEventListener('click', function() {
                    if (locked) return;

                    const selected = this.dataset.option;
                    const correct = currentQuestion.correct;

                    const allBtns = document.querySelectorAll('.option-btn');
                    allBtns.forEach(b => {
                        b.style.pointerEvents = 'none';
                        if (b.dataset.option === correct) {
                            b.classList.add('selected-true');
                        } else if (b.dataset.option === selected && selected !== correct) {
                            b.classList.add('selected-false');
                        }
                    });

                    if (selected === correct) {
                        feedbackEl.innerHTML = '🎉 BENAR! mantap!';
                    } else {
                        feedbackEl.innerHTML = `😬 ups ... jawaban: ${correct}`;
                    }
                    locked = true;
                });

                optionsGrid.appendChild(btn);
            });
        }

        function loadNewQuestion() {
            currentQuestion = pickRandomQuestion();
            renderQuestion();
        }

        resetBtn.addEventListener('click', loadNewQuestion);
        loadNewQuestion();
    </script>
</body>
</html>
